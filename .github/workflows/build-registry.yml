name: build-registry

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'
      - 'registry.json'

permissions:
  contents: write

concurrency:
  group: build-registry
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Regenerate registry.json
        run: node scripts/build-registry.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain registry.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add registry.json
            git commit -m "chore: rebuild registry [skip ci]"
            git push
          else
            echo "registry.json unchanged"
          fi
      - name: Purge jsDelivr CDN cache
        # jsDelivr caches mutable @main refs for up to 12h. Purge the registry
        # index (always) plus any theme assets changed in this push so the app
        # sees updates immediately instead of waiting for the cache to expire.
        run: |
          base="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main"
          paths="registry.json"
          changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'themes/**/theme.css' 'themes/**/thumbnail.png' 2>/dev/null || true)"
          paths="$paths $changed"
          for p in $paths; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' "$base/$p" || echo 000)"
            echo "purge $p -> $code"
          done
